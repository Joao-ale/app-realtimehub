services:
  postgres:
    image: postgres:16-alpine
    container_name: realtimehub-postgres
    environment:
      POSTGRES_DB: realtimehub
      POSTGRES_USER: realtimehub
      POSTGRES_PASSWORD: realtimehub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realtimehub -d realtimehub"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - realtimehub-network

  redis:
    image: redis:7-alpine
    container_name: realtimehub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - realtimehub-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: realtimehub-api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: realtimehub
      DB_USER: realtimehub
      DB_PASSWORD: realtimehub
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: change-me-in-production-use-at-least-256-bits-secret-key-here
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - realtimehub-network

  nginx:
    image: nginx:1.27-alpine
    container_name: realtimehub-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - realtimehub-network

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: realtimehub-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - api
    networks:
      - realtimehub-network

  grafana:
    image: grafana/grafana:11.3.1
    container_name: realtimehub-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - realtimehub-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  realtimehub-network:
    driver: bridge
