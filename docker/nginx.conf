events {
    worker_connections 1024;
}

http {
    upstream realtimehub_api {
        server api:8080;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=websocket_limit:10m rate=5r/s;

    server {
        listen 80;
        server_name localhost;

        # Compression
        gzip on;
        gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;
        gzip_min_length 1000;

        # API endpoints
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://realtimehub_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # WebSocket endpoints
        location /ws/ {
            limit_req zone=websocket_limit burst=10 nodelay;
            proxy_pass http://realtimehub_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # Metrics endpoint (restricted)
        location /metrics {
            proxy_pass http://realtimehub_api;
            proxy_set_header Host $host;
            allow 172.16.0.0/12; # Docker network
            deny all;
        }

        # Health check endpoint
        location /health {
            proxy_pass http://realtimehub_api/api/health;
            access_log off;
        }
    }
}
